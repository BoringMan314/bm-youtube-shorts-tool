<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n="popupTitle"></title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-width: 260px;
        max-width: 320px;
        padding: 12px 14px 14px;
        font-family: system-ui, "Segoe UI", "Microsoft JhengHei", "Hiragino Sans", sans-serif;
        font-size: 13px;
        color: #1a1a1a;
        background: #fff;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 14px;
        font-weight: 600;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 12px;
      }
      .row:last-of-type {
        margin-bottom: 0;
      }
      .label {
        flex: 1;
        font-size: 13px;
        line-height: 1.35;
        user-select: none;
      }
      .switch {
        position: relative;
        width: 40px;
        height: 22px;
        flex-shrink: 0;
        cursor: pointer;
      }
      .switch input {
        appearance: none;
        width: 40px;
        height: 22px;
        border-radius: 11px;
        background: #ccc;
        position: relative;
        margin: 0;
        cursor: pointer;
        transition: background 0.15s;
      }
      .slider {
        display: none;
      }
      .switch input::after {
        content: "";
        position: absolute;
        width: 18px;
        height: 18px;
        left: 2px;
        top: 2px;
        border-radius: 50%;
        background: #fff;
        transition: transform 0.15s;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
      }
      .switch input:checked {
        background: #1a73e8;
      }
      .switch input:checked::after {
        transform: translateX(18px);
      }
      .switch input:focus-visible {
        outline: 2px solid #1a73e8;
        outline-offset: 2px;
      }
      .bm-cycle {
        box-sizing: border-box;
        flex-shrink: 0;
        width: 48px;
        height: 48px;
        padding: 0;
        margin: 0;
        border: none;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: inherit;
        font-size: 13px;
        font-weight: 600;
        line-height: 1;
        letter-spacing: -0.02em;
        color: #fff;
        background: rgba(0, 0, 0, 0.55);
        transition: filter 0.12s ease, transform 0.1s ease;
      }
      .bm-cycle:hover {
        filter: brightness(1.12);
      }
      .bm-cycle:active {
        filter: brightness(0.92);
        transform: scale(0.96);
      }
      .bm-cycle:focus-visible {
        outline: 2px solid #1a73e8;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <h1 data-i18n="popupTitle"></h1>
    <div class="row">
      <span class="label" data-i18n="popupDefaultShortSpeedLabel"></span>
      <button type="button" id="btnDefaultSpeed" class="bm-cycle">
        <span id="lblDefaultSpeed">1×</span>
      </button>
    </div>
    <div class="row">
      <span class="label" data-i18n="popupDefaultHoldSpeedLabel"></span>
      <button type="button" id="btnHoldSpeed" class="bm-cycle">
        <span id="lblHoldSpeed">2×</span>
      </button>
    </div>
    <div class="row">
      <span class="label" data-i18n="popupArrowVolumeLabel"></span>
      <label class="switch" data-i18n-aria-label="popupArrowVolumeLabel">
        <input id="toggleArrowVolume" type="checkbox" />
        <span class="slider"></span>
      </label>
    </div>
    <div class="row">
      <span class="label" data-i18n="popupPanelExpandRightLabel"></span>
      <label class="switch" data-i18n-aria-label="popupPanelExpandRightLabel">
        <input id="togglePanelExpandRight" type="checkbox" />
        <span class="slider"></span>
      </label>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
